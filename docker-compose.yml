version: '3.8'
services:
  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    image: mern-backend:ci
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/testdb

  frontend:
    build: ./frontend
    image: mern-frontend:ci
    ports:
      - "3000:3000"
    depends_on:
      - backend
version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - dbdata:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cricket-intelligence
      - PORT=5000
    depends_on:
      - mongo

volumes:
  dbdata:
