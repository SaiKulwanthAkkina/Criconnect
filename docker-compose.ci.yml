version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - dbdata:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/cricket-backend:${IMAGE_TAG}
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/cricket-intelligence
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME}/cricket-frontend:${IMAGE_TAG}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  dbdata:
