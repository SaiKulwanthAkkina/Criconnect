name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build images with docker-compose
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d

      - name: Wait for services to start
        run: |
          echo "Waiting 15s for services..."
          sleep 15

      - name: Test backend
        run: |
          echo "Testing backend at http://localhost:5000/"
          if curl -sSf http://localhost:5000/ ; then echo "Backend OK"; else echo "Backend test failed" && docker compose logs --no-color && exit 1; fi

      - name: Stop services
        run: |
          docker compose down

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push backend image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker tag mern-backend:ci ${DOCKER_USERNAME}/mern-backend:${IMAGE_TAG}
          docker push ${DOCKER_USERNAME}/mern-backend:${IMAGE_TAG}
          docker tag mern-backend:ci ${DOCKER_USERNAME}/mern-backend:latest
          docker push ${DOCKER_USERNAME}/mern-backend:latest

      - name: Tag and push frontend image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker tag mern-frontend:ci ${DOCKER_USERNAME}/mern-frontend:${IMAGE_TAG}
          docker push ${DOCKER_USERNAME}/mern-frontend:${IMAGE_TAG}
          docker tag mern-frontend:ci ${DOCKER_USERNAME}/mern-frontend:latest
          docker push ${DOCKER_USERNAME}/mern-frontend:latest
